version: '3.8'

services:
  # Service de développement
  dev:
    build:
      context: .
      target: development
    container_name: infini-vtc-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

  # Service de production
  prod:
    build:
      context: .
      target: production
    container_name: infini-vtc-prod
    ports:
      - "8080:80"
    restart: unless-stopped
